name: Test, Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -v -race ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the latest release tag (e.g. v42), default to v0 if none
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // "v0"')
          NUM=${LATEST#v}
          NEXT=$((NUM + 1))
          echo "tag=v${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: v${NEXT}"

      - name: Build all platforms
        run: |
          mkdir -p dist

          platforms=(
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
            "windows/386"
            "linux/amd64"
            "linux/386"
            "linux/arm"
            "linux/arm64"
          )

          for platform in "${platforms[@]}"; do
            GOOS="${platform%/*}"
            GOARCH="${platform#*/}"
            output="yomitan-host-${GOOS}-${GOARCH}"
            if [ "$GOOS" = "windows" ]; then
              output="${output}.exe"
            fi
            echo "Building ${output}..."
            GOOS=$GOOS GOARCH=$GOARCH go build -o "dist/${output}"
          done

          ls -lh dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            dist/* \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --generate-notes
